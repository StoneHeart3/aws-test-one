name: Simple Project CI

# Controls when the action will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code so the runner can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run a one-line script
      - name: Run a one-line script
        run: echo "Starting the automated CI process..."

      # Step 3: Run a multi-line script or a file
      - name: Run a multi-line script
        run: |
          echo Add other commands here
          ls -la
          echo "Process complete!" 
